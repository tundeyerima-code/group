<html lang="en">
<head>

    <style>    
        body {
            background-color: #FFF9F2;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            max-width: 500px;
            width: 100%;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            position: relative;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .brand-name {
            font-weight: bold;
            font-size: 1.1rem;
            color: #333;
        }

        h1 {
            font-size: 1.5rem;
            line-height: 1.4;
            color: #1a1a1a;
            margin-bottom: 15px;
        }

        .intro-text {
            color: #444;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .benefits-list {
            list-style: none;
            padding: 0;
            margin-bottom: 30px;
        }

        .benefits-list li {
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            color: #555;
        }

        .benefits-list li::before {
            content: "✓";
            color: #25D366;
            font-weight: bold;
            margin-right: 10px;
        }

        .price-badge {
            background: #f8f9fa;
            border: 2px dashed #1DA1F2;
            border-radius: 50%;
            width: 100px;
            height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px;
            text-align: center;
        }

        .old-price {
            text-decoration: line-through;
            color: #888;
            font-size: 0.8rem;
        }

        .new-price {
            font-weight: bold;
            font-size: 1.2rem;
            color: #1a1a1a;
        }

        .whatsapp-btn {
            display: block;
            background-color: #25D366;
            color: white;
            text-align: center;
            padding: 15px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s;
        }

        .whatsapp-btn:hover {
            transform: scale(1.02);
            background-color: #20ba5a;
        }
    </style>
</head>
